services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lemonsuk
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - '5432:5432'
    volumes:
      - lemonsuk-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - lemonsuk-redis:/data

  api:
    image: lemonsuk-api:latest
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      - postgres
      - redis
    environment:
      PORT: ${PORT:-8787}
      HOST: ${HOST:-0.0.0.0}
      APP_URL: ${APP_URL:-http://localhost:3000}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost:3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/lemonsuk}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-replace-internal-service-token}
      REVIEW_QUEUE_KEY: ${REVIEW_QUEUE_KEY:-lemonsuk:review-requested}
      JWT_SECRET: ${JWT_SECRET:-replace-me}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-}
    ports:
      - '8787:8787'
    restart: unless-stopped

  web:
    image: lemonsuk-web:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
      PORT: 3000
    ports:
      - '3000:3000'
    restart: unless-stopped

  review-orchestrator:
    image: lemonsuk-review-orchestrator:latest
    build:
      context: .
      dockerfile: apps/review-orchestrator/Dockerfile
    depends_on:
      - api
      - redis
    environment:
      REVIEW_HOST: 0.0.0.0
      REVIEW_PORT: 8790
      API_INTERNAL_BASE_URL: ${API_INTERNAL_BASE_URL:-http://api:8787/api/v1}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-replace-internal-service-token}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REVIEW_QUEUE_KEY: ${REVIEW_QUEUE_KEY:-lemonsuk:review-requested}
      EDDIE_BASE_URL: ${EDDIE_BASE_URL:-}
      EDDIE_API_KEY: ${EDDIE_API_KEY:-}
      EDDIE_WEBHOOK_SECRET: ${EDDIE_WEBHOOK_SECRET:-replace-eddie-webhook-secret}
    ports:
      - '8790:8790'
    restart: unless-stopped

volumes:
  lemonsuk-postgres:
  lemonsuk-redis:
