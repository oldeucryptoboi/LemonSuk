services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lemonsuk
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - '5432:5432'
    volumes:
      - lemonsuk-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - lemonsuk-redis:/data

  api:
    image: lemonsuk-api:latest
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      - postgres
      - redis
    environment:
      PORT: ${PORT:-8787}
      HOST: ${HOST:-0.0.0.0}
      APP_URL: ${APP_URL:-http://localhost:3000}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:8787}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost:3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/lemonsuk}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-replace-internal-service-token}
      REVIEW_QUEUE_KEY: ${REVIEW_QUEUE_KEY:-lemonsuk:review-requested}
      JWT_SECRET: ${JWT_SECRET:-replace-me}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-}
      AVATAR_S3_BUCKET: ${AVATAR_S3_BUCKET:-}
      AVATAR_S3_REGION: ${AVATAR_S3_REGION:-}
      AVATAR_CLOUDFRONT_BASE_URL: ${AVATAR_CLOUDFRONT_BASE_URL:-}
      AVATAR_S3_PREFIX: ${AVATAR_S3_PREFIX:-agent-avatars}
      X_CLIENT_ID: ${X_CLIENT_ID:-}
      X_CLIENT_SECRET: ${X_CLIENT_SECRET:-}
      TWITTER_CLIENT_ID: ${TWITTER_CLIENT_ID:-}
      TWITTER_CLIENT_SECRET: ${TWITTER_CLIENT_SECRET:-}
      X_BEARER_TOKEN: ${X_BEARER_TOKEN:-}
      TWITTER_BEARER_TOKEN: ${TWITTER_BEARER_TOKEN:-}
    ports:
      - '8787:8787'
    restart: unless-stopped

  web:
    image: lemonsuk-web:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    depends_on:
      - api
    environment:
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://api:8787}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-replace-internal-service-token}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
      REVIEW_CONSOLE_ACCESS_KEY: ${REVIEW_CONSOLE_ACCESS_KEY:-}
      PORT: 3000
    ports:
      - '3000:3000'
    restart: unless-stopped

  review-orchestrator:
    image: lemonsuk-review-orchestrator:latest
    build:
      context: .
      dockerfile: apps/review-orchestrator/Dockerfile
    depends_on:
      - api
      - redis
    environment:
      REVIEW_HOST: 0.0.0.0
      REVIEW_PORT: 8790
      API_INTERNAL_BASE_URL: ${API_INTERNAL_BASE_URL:-http://api:8787/api/v1}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-replace-internal-service-token}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REVIEW_QUEUE_KEY: ${REVIEW_QUEUE_KEY:-lemonsuk:review-requested}
      EDDIE_BASE_URL: ${EDDIE_BASE_URL:-}
      EDDIE_API_KEY: ${EDDIE_API_KEY:-}
      LEMONSUK_REVIEW_TOKEN: ${LEMONSUK_REVIEW_TOKEN:-}
      EDDIE_REVIEW_TOKEN: ${EDDIE_REVIEW_TOKEN:-}
      LEMONSUK_REVIEW_WEBHOOK_SECRET: ${LEMONSUK_REVIEW_WEBHOOK_SECRET:-}
      EDDIE_WEBHOOK_SECRET: ${EDDIE_WEBHOOK_SECRET:-replace-eddie-webhook-secret}
    ports:
      - '8790:8790'
    restart: unless-stopped

  claude-agent-runner:
    image: lemonsuk-claude-agent-runner:latest
    build:
      context: .
      dockerfile: apps/claude-agent-runner/Dockerfile
    profiles:
      - manual
    depends_on:
      - api
    environment:
      CLAUDE_REVIEW_AGENT_INTERNAL_API_BASE_URL: ${API_INTERNAL_BASE_URL:-http://api:8787/api/v1}
      CLAUDE_REVIEW_AGENT_INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-replace-internal-service-token}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_REVIEW_AGENT_MODEL: ${CLAUDE_REVIEW_AGENT_MODEL:-claude-sonnet-4-5}
      CLAUDE_REVIEW_AGENT_KEY: ${CLAUDE_REVIEW_AGENT_KEY:-claude-review-default}
      CLAUDE_REVIEW_AGENT_MAX_TURNS: ${CLAUDE_REVIEW_AGENT_MAX_TURNS:-8}
      CLAUDE_REVIEW_AGENT_MAX_BUDGET_USD: ${CLAUDE_REVIEW_AGENT_MAX_BUDGET_USD:-1}
      CLAUDE_REVIEW_AGENT_LEASE_SECONDS: ${CLAUDE_REVIEW_AGENT_LEASE_SECONDS:-900}
      CLAUDE_REVIEW_AGENT_WORKSPACE_ROOT: ${CLAUDE_REVIEW_AGENT_WORKSPACE_ROOT:-/var/lib/lemonsuk-claude-agents}
    volumes:
      - lemonsuk-claude-agent-workspace:/var/lib/lemonsuk-claude-agents
    restart: "no"

volumes:
  lemonsuk-postgres:
  lemonsuk-redis:
  lemonsuk-claude-agent-workspace:
